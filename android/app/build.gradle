//file:noinspection GrDeprecatedAPIUsage
apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'

android {
    namespace "closeshop.dev"
    //noinspection GrDeprecatedAPIUsage
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "closeshop.dev"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true

        aaptOptions {
            // Files and dirs to omit from the packaged assets dir
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'com.google.android.gms') {
            // Let the BOM handle all GMS versions consistently
            // We only force versions if we absolutely need to override the BOM
        }
        if (details.requested.group == 'com.google.android.libraries.identity.googleid') {
            details.useVersion rootProject.ext.googleIdVersion
        }
        if (details.requested.group == 'androidx.credentials') {
            details.useVersion rootProject.ext.androidxCredentialsVersion
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar', '*.aar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.browser:browser:1.8.0'

    implementation platform("com.google.firebase:firebase-bom:$firebaseBomVersion")
    
    implementation "com.google.android.gms:play-services-auth"
    implementation "com.google.android.gms:play-services-location"
    implementation "com.google.firebase:firebase-messaging"

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'
